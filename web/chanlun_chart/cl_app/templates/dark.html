<meta name="csrf-token" content="{{ csrf_token() }}">
<script type="text/javascript">
    // CSRF：所有非幂等 ajax 请求自动注入 X-CSRFToken header；
    // 同源 GET/HEAD/OPTIONS/TRACE 默认豁免；跨域请求由 jQuery 的 crossDomain 标记跳过。
    (function () {
        if (typeof window.jQuery === 'undefined') { return; }
        var meta = document.querySelector('meta[name="csrf-token"]');
        if (!meta || !meta.content) { return; }
        window.jQuery.ajaxSetup({
            beforeSend: function (xhr, settings) {
                if (settings.crossDomain) { return; }
                if (/^(GET|HEAD|OPTIONS|TRACE)$/i.test(settings.type)) { return; }
                xhr.setRequestHeader('X-CSRFToken', meta.content);
            }
        });
    })();

    (function () {
        if (window.JSON && window.JSON.parse) {
            var c = document.getElementsByTagName("head");

            try {
                var b = JSON.parse(localStorage.tv_chart);
            } catch (d) {
                b = {};
            }
            if ("dark" === b.theme) {
                var a = document.createElement("link");
                a.href = "{{ url_for('static', filename='css/layui-theme-dark.css') }}";
                a.rel = "stylesheet";
                a.id = "layuicss-theme-dark";
                c[0].appendChild(a)

                var b = document.createElement("link");
                b.href = "{{ url_for('static', filename='css/xm-select-dark.css') }}";
                b.rel = "stylesheet";
                b.id = "xmselectcss-theme-dark";
                c[0].appendChild(b)
            }
        }
    })();

    // 已移除百度统计脚本（hm.baidu.com）以减少第三方数据外发；如需开启可恢复。
</script>
<style>
    .layui-card-body p,
    li {
        color: #999;
    }
</style>
