<!DOCTYPE HTML>
<html lang="zh">

<head>
    <title>多市场标的列表</title>
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,minimum-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layui.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
    <script type="text/javascript" src="{{ url_for('static', filename='layui.js') }}"></script>
    <script type="text/javascript" src="{{ url_for('static', filename='jquery-3.7.0.min.js') }}"></script>
    {% include 'dark.html' %}
    <style>
        .symbols-toolbar {
            padding: 16px 20px 4px 20px;
        }

        .symbols-tip {
            margin: 0 20px 10px 20px;
        }

        #symbols_table_wrap {
            padding: 0 20px 20px 20px;
        }

        .symbol-code-link {
            color: #1e9fff;
            cursor: pointer;
            font-weight: 500;
        }
    </style>
</head>

<body class="layui-fluid">

    <form class="layui-form symbols-toolbar" lay-filter="symbols_form">
        <div class="layui-form-item">
            <div class="layui-inline">
                <label class="layui-form-label">市场</label>
                <div class="layui-input-inline" style="width: 180px;">
                    <select name="market" lay-filter="market_select" id="market_select">
                        {% for m_key, m_label in markets %}
                        <option value="{{ m_key }}" {% if m_key==default_market %}selected{% endif %}>{{ m_label }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="layui-inline">
                <label class="layui-form-label">搜索</label>
                <div class="layui-input-inline" style="width: 240px;">
                    <input type="text" id="search_input" placeholder="代码 / 名称 / 拼音首字母" autocomplete="off"
                        class="layui-input" />
                </div>
            </div>
            <div class="layui-inline">
                <button type="button" id="btn_search" class="layui-btn layui-bg-red">
                    <i class="layui-icon layui-icon-search"></i> 查询
                </button>
                <button type="button" id="btn_reset" class="layui-btn layui-btn-primary layui-border-red">
                    <i class="layui-icon layui-icon-refresh"></i> 重置
                </button>
                <span id="total_tip" style="margin-left: 12px; color: #888;"></span>
            </div>
        </div>
    </form>

    <blockquote class="layui-elem-quote layui-quote-nm symbols-tip">
        切换上方市场即可加载对应标的列表；点击"代码"列将以新窗口打开缠论图表。
    </blockquote>

    <div id="symbols_table_wrap">
        <table class="layui-hide" id="symbols_table" lay-filter="symbols_table"></table>
    </div>

    <script>
        $(function () {
            layui.use(['form', 'table', 'layer'], function () {
                const form = layui.form;
                const table = layui.table;
                const layer = layui.layer;

                // 当前查询参数（市场 + 关键词），分页时复用
                const state = {
                    market: $('#market_select').val(),
                    q: ''
                };

                function renderTable() {
                    table.render({
                        elem: '#symbols_table',
                        url: '/symbols/list',
                        method: 'get',
                        where: { market: state.market, q: state.q },
                        request: { pageName: 'page', limitName: 'page_size' },
                        response: {
                            statusName: 'ok',
                            statusCode: true,
                            countName: 'total',
                            dataName: 'items'
                        },
                        page: {
                            layout: ['count', 'prev', 'page', 'next', 'limit', 'skip'],
                            limits: [50, 100, 200, 500],
                            limit: 50
                        },
                        done: function (res) {
                            const total = (res && res.total) || 0;
                            $('#total_tip').text('共 ' + total + ' 条');
                        },
                        cols: [[
                            {
                                field: 'code', title: '代码', width: 220, templet: function (d) {
                                    const url = '/?market=' + encodeURIComponent(state.market)
                                        + '&code=' + encodeURIComponent(d.code);
                                    return '<a class="symbol-code-link" href="' + url
                                        + '" target="_blank" rel="noopener">' + d.code + '</a>';
                                }
                            },
                            { field: 'name', title: '名称', minWidth: 200 },
                            { field: 'pinyin', title: '拼音首字母', width: 180 },
                            { field: 'type', title: '类型', width: 120 }
                        ]]
                    });
                }

                // 市场切换：重置关键词并重新渲染
                form.on('select(market_select)', function (data) {
                    state.market = data.value;
                    state.q = '';
                    $('#search_input').val('');
                    renderTable();
                });

                $('#btn_search').click(function () {
                    state.q = ($('#search_input').val() || '').trim();
                    renderTable();
                });

                // 回车触发查询
                $('#search_input').keydown(function (e) {
                    if (e.keyCode === 13) {
                        e.preventDefault();
                        $('#btn_search').click();
                    }
                });

                $('#btn_reset').click(function () {
                    state.q = '';
                    $('#search_input').val('');
                    renderTable();
                });

                // 首次渲染
                renderTable();
            });
        });
    </script>
</body>

</html>
